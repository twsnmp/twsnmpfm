appId: jp.co.twise.twsnmpfm
---
- launchApp:
    clearState: true
# Switch to English
- tapOn:
    id: "settings_button"
- extendedWaitUntil:
    visible:
      id: "language_dropdown"
    timeout: 10000
- tapOn:
    id: "language_dropdown"
- tapOn:
    id: "language_item_en"
- tapOn:
    id: "save_settings_button"
- waitForAnimationToEnd
- assertVisible: "TWSNMP For Mobile"

# Switch back to Japanese
- tapOn:
    id: "settings_button"
- extendedWaitUntil:
    visible:
      id: "language_dropdown"
    timeout: 10000
- tapOn:
    id: "language_dropdown"
- tapOn:
    id: "language_item_ja"
- tapOn:
    id: "save_settings_button"
